name: Osteomyelitis Medical News

on:
  schedule:
    # 每天北京时间 10:00 执行 (UTC 2:00)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate Medical Daily Report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scripts/generate_osteomyelitis_report.py

      - name: Commit report
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "📰 骨髓炎医学资讯 - $(date '+%Y-%m-%d')"
          git push
